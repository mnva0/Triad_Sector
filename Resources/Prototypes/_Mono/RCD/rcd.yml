# Diagonal hull plating — one mode, rotate like other RCD objects (HardLightSector/HardLight#1153)
- type: rcd
  id: PlatingDiagonal
  name: rcd-component-plating-diagonal
  category: WallsAndFlooring
  sprite: /Textures/_Mono/Tiles/plating/ne.png
  mode: ConstructTile
  prototype: PlatingCornerNE
  rotation: User
  constructTileByDirection:
    North: PlatingCornerNE
    East: PlatingCornerSE
    South: PlatingCornerSW
    West: PlatingCornerNW
  cost: 1
  delay: 1
  collisionMask: InteractImpassable
  rules:
    - CanBuildOnEmptyTile
  fx: EffectRCDConstruct1

