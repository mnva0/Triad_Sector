# Triad fork RCD recipes — see README.md in this folder for ports (#888, #1153, #1237), C# touch points, and merge notes.
# Walls
- type: rcd
  id: WallReinforced
  category: WallsAndFlooring
  sprite: /Textures/Interface/Radial/RCD/reinforced_wall.png
  mode: ConstructObject
  prototype: WallReinforced
  cost: 6
  delay: 2
  collisionMask: FullTileMask
  rotation: Fixed
  fx: EffectRCDConstruct2

