- type: entity
  id: BaseStationEventNFModerateDelay
  parent: BaseGameRule
  abstract: true
  components:
    - type: GameRule
      delay:
        min:  30
        max:  40

- type: entity
  id: BluespaceCargoCrate
  parent: BaseStationEventNFModerateDelay
  components:
  - type: StationEvent
    startAnnouncement: bluespace-cargo-event-announcement
    weight: 5
    duration: 35
    reoccurrenceDelay: 60 # Mono
  - type: BluespaceCargoRule
    spawnerPrototype: RandomCargoSpawner
    requireSafeAtmosphere: true
    minimumSpawns: 2
    maximumSpawns: 5

- type: entity
  id: BluespaceMcCargoCrate
  parent: BaseStationEventNFModerateDelay
  components:
  - type: StationEvent
    startAnnouncement: bluespace-cargo-event-announcement
    earliestStart: 20
    weight: 5
    duration: 35
    maximumPlayers: 20
    reoccurrenceDelay: 120 # Mono
  - type: BluespaceCargoRule
    spawnerPrototype: CrateFoodMcCargo
    flashPrototype: EffectFlashMcBluespace
    requireSafeAtmosphere: true

- type: entity
  id: BluespaceSyndicateCrate
  parent: BaseStationEventLongDelay # Triad change to long cause its basically just a free loot
  components:
  - type: StationEvent
    startAnnouncement: bluespace-syndicate-crate-event-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    weight: 1
    duration: 35
    earliestStart: 60 # Mono
    #minimumPlayers: 20 # Mono
    reoccurrenceDelay: 480 # 8 hours #Triad Revert back to 8
    maxOccurrences: 1 #Triad
  - type: BluespaceCargoRule
    spawnerPrototype: CrateSyndicateSurplusBundle
    maximumSpawns: 1

- type: entity
  id: SmugglingFax
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    weight: 8 # Fairly common.
    duration: 35
    earliestStart: 50
    minimumPlayers: 2
    reoccurrenceDelay: 75 # Triad 75 < 50 
  - type: RandomFaxRule
    minFaxes: 2 # Mono
    maxFaxes: 3 # Mono
    name: deaddrop-faxed-hint-name
    prototypeId: PaperDeadDropFax
    content: deaddrop-faxed-hint-content # Default contents, will be edited.
    stampedBy:
    - stampedName: deaddrop-faxed-hint-signature
      stampedColor: "#850000"
    stampState: paper_stamp-syndicate
    preFaxActions:
    - !type:GetRandomDeadDropAction

- type: entity
  id: SmugglingFaxBig
  parent: BaseStationEventLongDelay # Triad changed to long
  components:
  - type: StationEvent
    weight: 50 # Fairly common. #Triad 50 < 100
    minimumPlayers: 10
    duration: 35
    reoccurrenceDelay: 360 # Triad - 6 Hours for the big ones
  - type: RandomFaxRule
    minFaxes: 4 # Mono
    maxFaxes: 5 # Mono
    name: deaddrop-faxed-hint-name
    prototypeId: PaperDeadDropFax
    content: deaddrop-faxed-hint-content # Default contents, will be edited.
    stampedBy:
    - stampedName: deaddrop-faxed-hint-signature
      stampedColor: "#850000"
    stampState: paper_stamp-syndicate
    preFaxActions:
    - !type:GetRandomDeadDropAction
