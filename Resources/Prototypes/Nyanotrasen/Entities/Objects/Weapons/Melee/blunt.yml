- type: entity
  name: kanabou
  parent: BaseItem
  id: Kanabou
  description: The classic oni weapon, for those that forgo subtlety.
  components:
  - type: Sprite
    sprite: Nyanotrasen/Objects/Weapons/Melee/kanabou.rsi
    state: icon
  - type: Item
    size: Huge
    shape:
    - 0,0,1,4 # Triad Glaive & Kanobou Shape
  - type: MeleeWeapon
    heavyStaminaCost: 15 # Triad
    attackRate: 0.6
    wideAnimationRotation: -135 # Triad, hopefully fixes weird sprite swinging
    range: 1.75
    damage:
      types:
        Blunt: 20 # Triad enough to be on par with Fireaxes
        Structural: 20 # Triad
    bluntStaminaDamageFactor: 1.30 # Triad, i have no idea how to count so uh 1.3
    soundHit:
      collection: MetalThud
  - type: SpeedModifiedOnWield # Triad
    walkModifier: 0.9
    sprintModifier: 0.7
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 20 # Triad
        Structural: 40 # Triad
  - type: Clothing
    sprite: Nyanotrasen/Objects/Weapons/Melee/kanabou.rsi
    quickEquip: false
    slots:
    - back
    - suitStorage
# Triad Start - Audio
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/boots_pickup.ogg
      params:
        volume: -2
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/crowbar_drop.ogg
      params:
        volume: -2
  - type: EmitSoundOnLand # Triad, added sound on throw
    sound:
      path: /Audio/_Goobstation/Items/handling/sabre_drop.ogg
      params:
        volume: -2
      
# Triad End - Audio

- type: entity
  name: shinai
  parent: BaseItem
  id: Shinai
  description: A bamboo sword, commonly used in kendo. Made some time after the realization that wooden swords hurt a lot.
  components:
  - type: Sprite
    sprite: Nyanotrasen/Objects/Weapons/Melee/shinai.rsi
    state: icon
  - type: MeleeWeapon
    attackRate: 1.25
    range: 1.75
    bluntStaminaDamageFactor: 2.0
    damage:
      types:
        Blunt: 4
    soundHit:
      collection: WoodDestroyHeavy
  - type: StaminaDamageOnHit
    damage: 10
  - type: Item
    size: Normal
    sprite: Nyanotrasen/Objects/Weapons/Melee/shinai.rsi
  - type: DisarmMalus