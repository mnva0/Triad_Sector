- type: entity
  parent: IngotBase
  id: IngotPlutonium
  name: plutonium bar
  description: Ingots of pure fissile plutonium. A byproduct of nuclear fission reactors. # Mono
  suffix: Full
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      Plutonium: 100
  - type: Stack
    stackType: Plutonium
    baseLayer: base
    layerStates:
    - plutonium # Mono
    - plutonium_2 # Mono
    - plutonium_3 # Mono
  - type: Sprite
    state: plutonium_3 # Mono
    sprite: _Mono/Objects/Materials/fissiles.rsi
    layers:
    - state: plutonium_3 # Mono
      map: ["base"]
  - type: Item
    heldPrefix: plutonium
  - type: Appearance
  # - type: Extractable
  #   grindableSolutionName: gold
  # - type: SolutionContainerManager
  #   solutions:
  #     gold:
  #       reagents:
  #       - ReagentId: Silver
  #         Quantity: 10
  - type: RadiationSource
    intensity: 0.08
    slope: 3
  - type: Explosive # Mono
    explosionType: Radioactive
    totalIntensity: 5.0 # More bulk than fissile uranium
    intensitySlope: 5
    maxIntensity: 4
  - type: ThermalSignature # Mono
  - type: PassiveThermalSignature # Mono
    signature: 150000 # 0.1x fissile uranium - more in bulk due to how its obtained
  - type: RadiationReceiver # Mono
  - type: ChainRadiation # Mono
    baseIntensity: 0.4
    coefficient: 0.1
    explosionThreshold: 10 # The limit is about 20-25, like uranium.
    totalIntensity: 15000
    intensitySlope: 2000
    maxIntensity: 4000
  - type: DamageOnLand # Mono
    damage:
      types:
        Burn: 5 # Plutonium is hot!
        Radiation: 5
  - type: PointLight
    radius: 1.2
    energy: 0.8
    castShadows: false
    color: "#22bbff"

- type: entity
  parent: IngotPlutonium
  id: IngotPlutonium1
  name: plutonium bar
  suffix: Single
  components:
  - type: Sprite
    state: plutonium # Mono
  - type: Stack
    count: 1
