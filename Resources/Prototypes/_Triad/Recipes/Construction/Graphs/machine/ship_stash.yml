- type: constructionGraph
  id: CivilianStorageStashGraph
  start: start
  graph:
  - node: start
    edges:
    - to: CivilianStorageStashNode
      steps:
        - material: Steel
          amount: 20
          doAfter: 1
        - material: Plasteel
          amount: 10
          doAfter: 2
        - material: Cable
          amount: 5
          doAfter: 3
    
  - node: CivilianStorageStashNode
    entity: CivilianStorageStash
    edges:
    - to: start
      steps:
        - tool: Prying
          doAfter: 2
      completed:
        - !type:SpawnPrototype
          prototype: SheetPlasteel1
          amount: 1
        - !type:SpawnPrototype
          prototype: SheetSteel1
          amount: 1
        - !type:EmptyAllContainers
        - !type:DeleteEntity

