- type: entity
  parent: [BaseStructureDisableAnchoring, VendingMachine]
  id: VendingMachineAdmin
  name: Etheralvend
  description: Things you get from forces beyond what you can get.
  components:
  - type: VendingMachine
    pack: EtheralvendInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    ejectState: eject-unshaded
    denyState: deny-unshaded
#  - type: Advertise
#    pack: FlatpackVendAds
  - type: Sprite
    sprite: _NF/Structures/Machines/VendingMachines/flatpackvend.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#4b93ad"
  - type: MarketModifier
    mod: 150
