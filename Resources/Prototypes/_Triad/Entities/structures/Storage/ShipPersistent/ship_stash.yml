- type: entity
  id: MilitaryStorageStash
  parent: BaseStructureDynamic
  name: military storage stash
  description: A reinforced flatpack storage unit for secure operations. Preserves stored items across ship deployments.
  components:
    - type: ContainerContainer
      containers:
        storagebase: !type:Container
          ents: []
    - type: Sprite
      sprite: _Triad/Structure/Storage/ShipStashes/military_storage_stash.rsi
      state: military_storage_rsi
      noRot: true
    - type: Transform
      noRot: true
      anchored: true
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          density: 15
    - type: InteractionOutline
    - type: UserInterface
      interfaces:
        enum.StorageUiKey.Key:
          type: StorageBoundUserInterface
    - type: Storage
      grid:
      - 0,0,3,7
      - 5,0,11,7
      maxItemSize: Ginormous
      blacklist:
        components:
        - StorageFill
        - PresetIdCard
        - IdCard
        - Access
        - Store
        - Cash
        - Headset
    - type: HLPersistOnShipSave
    - type: Construction
      graph: MilitaryStorageStashGraph
      node: MilitaryStorageStashNode

