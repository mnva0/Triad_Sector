- type: entity
  id: MilitaryStorageStash
  parent: BaseStructureDynamic
  name: military storage stash
  description: A hardened storage unit designed for long-term deployment. Contents are securely preserved across ship operations.
  components:
  - type: ContainerContainer
  - type: Sprite
    sprite: _Triad/Structure/Storage/ShipStashes/military_storage_stash.rsi
    state: military_storage_rsi
    noRot: true
  - type: Transform
    anchored: false
  - type: Anchorable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 15
  - type: InteractionOutline
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: Storage
    grid:
    - 0,0,3,7
    - 5,0,11,7
    maxItemSize: Ginormous
    blacklist:
      components:
      - StorageFill
      - PresetIdCard
      - IdCard
      - Access
      - Store
      - Cash
      - Headset
  - type: HLPersistOnShipSave

- type: entity
  id: MedicalBluespaceDesk
  parent: BaseStructureDynamic
  name: medical bluespace desk
  description: An advanced medical workstation utilizing bluespace compression. Safely retains its contents across ship saves.
  components:
  - type: ContainerContainer
  - type: Sprite
    sprite: _Triad/Structure/Storage/ShipStashes/medical_bluespace_desk.rsi
    state: medical_bluespace_desk
    noRot: true
  - type: Transform
    anchored: false
  - type: Anchorable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 15
  - type: InteractionOutline
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: Storage
    grid:
    - 0,0,2,1
    - 0,3,2,6
    - 4,0,9,6
    maxItemSize: Ginormous
    whitelist:
      components:
        - Pill
        - Hypospray
        - MedicalBag
      tags:
        - PillCanister
        - CentrifugeCompatible
        - Syringe
        - Ointment
        - Brutepack
        - Bloodpack
        - Gauze
        - Bottle
        - GlassBeaker
        - ChemDispensable
        - MedicialBluespaceDeskCompatible
  - type: HLPersistOnShipSave

