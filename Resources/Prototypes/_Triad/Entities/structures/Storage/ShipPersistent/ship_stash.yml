- type: entity
  id: MilitaryStorageStash
  parent: BaseStructureDynamic
  name: military storage stash
  description: Tbd
  components:
  - type: Sprite
    sprite: _Triad/Structure/Storage/ShipStashes/military_storage_stash.rsi
    state: military_storage_rsi
    noRot: true
  - type: Transform
    noRot: true
    anchored: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 15
  - type: InteractionOutline
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: Storage
    grid:
    - 0,0,3,7
    - 5,0,11,7
    maxItemSize: Ginormous
    blacklist:
      components:
      - StorageFill
      - PresetIdCard
      - IdCard
      - Access
      - Store
      - Cash
      - Headset
  - type: HLPersistOnShipSave

- type: constructionGraph
  id: MilitaryStorageStashGraph
  start: start
  graph:
  - node: start
    edges:
    - to: stash
      steps:
      - material: Steel
        amount: 20
      - tool: Welding
        doAfter: 4
      - material: Plasteel
        amount: 10
      - tool: Screwing
        doAfter: 8
      - material: Plastitanium
        amount: 12
      - tool: Welding
        doAfter: 4

- type: entity
