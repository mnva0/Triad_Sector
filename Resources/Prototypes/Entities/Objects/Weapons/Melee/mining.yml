- type: entity
  name: pickaxe
  parent: [ BaseItem, RecyclableItemWoodMedium ] # Frontier: added RecyclableItemWoodMedium
  id: Pickaxe
  description: Notched to perfection, for jamming it into rocks.
  components:
  - type: Tag
    tags:
    - Pickaxe
  - type: Sprite
    sprite: Objects/Weapons/Melee/pickaxe.rsi
    state: pickaxe
  - type: MeleeWeapon
    autoAttack: true #Mono
    attackRate: 0.75
    wideAnimationRotation: -135
    soundHit:
      path: "/Audio/Weapons/smash.ogg"
      params:
        volume: -3
    damage:
      types:
        Blunt: 5
        Piercing: 5
        Structural: 15 # Triad 15 < 10
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 15
        Piercing: 5
        Structural: 35
  - type: Item
    size: Normal
    shape:
    - 0,0,2,0
    - 1,1,1,2
    sprite: Objects/Weapons/Melee/pickaxe.rsi
    storedRotation: -45
  - type: UseDelay
# Triad Start - Audio
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_pickup.ogg
      params:
        volume: -6
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/crowbar_drop.ogg
      params:
        volume: -6
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/sabre_drop.ogg
      params:
        volume: -6
# Triad End - Audio

- type: entity
  name: mining drill
  parent: BaseItem
  id: MiningDrill
  description: Powerful tool used to quickly drill through rocks.
  components:
  - type: Item
    size: Small
    storedRotation: -90
  - type: Tag
    tags:
    - Pickaxe
  - type: Sprite
    sprite: Objects/Tools/handdrill.rsi
    state: handdrill
  - type: MeleeWeapon
    autoAttack: true
    angle: 0
    wideAnimationRotation: -90
    soundHit:
      path: "/Audio/Items/drill_hit.ogg"
    attackRate: 4
    heavyStaminaCost: 0 # Mono
    damage:
      groups:
        Brute: 6
      types:
        Structural: 15
# Triad Start - Audio
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/Items/change_drill.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/crowbar_drop.ogg
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/gun_drop.ogg
      params:
        volume: -4
# Triad End - Audio

- type: entity
  name: diamond tipped mining drill
  parent: MiningDrill
  id: MiningDrillDiamond
  description: A significantly more efficient mining drill tipped with diamond.
  components:
  - type: Sprite
    sprite: Objects/Tools/handdrilldiamond.rsi
    state: handdrill
  - type: MeleeWeapon
    autoAttack: true
    angle: 0
    wideAnimationRotation: -90
    soundHit:
      path: "/Audio/Items/drill_hit.ogg"
    attackRate: 4
    heavyStaminaCost: 0 # Mono
    damage:
      groups:
        Brute: 8
      types:
        Structural: 35
  - type: MiningGatheringHard # Frontier


- type: entity
  abstract: true
  parent: BaseItem
  id: BaseWeaponCrusher # Crusher? But I...
  name: crusher
  description: An early design of the proto-kinetic accelerator.
  components:
  - type: Sharp
  - type: UnpoweredFlashlight
  - type: PointLight
    color: "#ffeead"
    enabled: false
    radius: 4

- type: entity
  parent: BaseWeaponCrusher
  id: WeaponCrusher
  components:
  - type: Tag
    tags:
    - Pickaxe
  - type: Sprite
    sprite: Objects/Weapons/Melee/crusher.rsi
    state: icon
  - type: AmmoCounter
  - type: UseDelayOnShoot
  - type: UseDelay
    delay: 0.9
  - type: LeechOnMarker
    leech:
      groups:
        Brute: -10
  - type: Gun
    soundGunshot: /Audio/Weapons/plasma_cutter.ogg
    fireRate: 1
    useKey: false
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 0.5
    rechargeSound:
      path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
  - type: BasicEntityAmmoProvider
    proto: BulletCharge
    capacity: 1
    count: 1
  - type: MeleeWeapon
    heavyStaminaCost: 10 # Triad
    autoAttack: true #Mono
    attackRate: 1.25
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 5
        Slash: 10
        Structural: 5 # Triad
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 15 # Triad 10 < 5
        Structural: 45 # Triad 45 < 30, total of 50
  - type: GunRequiresWield
  - type: SkipPlayerAccuracyModifier #Mono
  - type: Item
    size: Huge # Triad resize from Ginormous to Huge with Axe size
    shape:
    - 0,0,2,3 # Triad Axe size, slightly bigger than sword
    sprite: Objects/Weapons/Melee/crusher-inhands.rsi
  - type: DisarmMalus
  - type: Prying
  - type: Clothing # Frontier
    sprite: Objects/Weapons/Melee/crusher-inhands.rsi # Triad back sprite
    quickEquip: false # Frontier
    slots: # Frontier
    - back # Frontier
    - suitStorage # Frontier
# Triad Start - Audio
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/crowbar_drop.ogg
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/sabre_drop.ogg
      params:
        volume: -4
# Triad End - Audio

- type: entity
  parent: [ BaseKnife, BaseWeaponCrusher]
  id: WeaponCrusherDagger
  name: crusher dagger
  description: A scaled down version of a proto-kinetic crusher. Uses kinetic energy to vibrate the blade at high speeds.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/crusher_dagger.rsi
    state: icon
  - type: MeleeWeapon
    autoAttack: true
    wideAnimationRotation: -135
    attackRate: 2
    damage:
      types:
        Slash: 20 # Triad 20 < 16
        Structural: 10 # Triad
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 30 #Triad 
  - type: DisarmMalus
    malus: 0.225
  - type: ThrowingAngle
    angle: 225

# Like a crusher... but better
- type: entity
  parent: WeaponCrusher
  id: WeaponCrusherGlaive
  name: crusher glaive
  description: An early design of the proto-kinetic accelerator, in glaive form.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/crusher_glaive.rsi
  - type: UseDelay
    delay: 1.9
  - type: LeechOnMarker
    leech:
      groups:
        Brute: -21
# Triad Start
  - type: MeleeWeapon
    heavyStaminaCost: 10 
    autoAttack: true
    attackRate: 1.25
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 5
        Slash: 10
        Structural: 5
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 15 # Triad 15 < 5, difference between axe is more slash than blunt
        Structural: 45 # Triad 45 < 30, total of 50
#Triad End
  - type: Tag
    tags:
    - Pickaxe
  - type: Item
    size: Huge # Triad
    shape: 
    - 0,0,1,4 # Triad Glaive & Kanobou Shape
    sprite: Objects/Weapons/Melee/crusher_glaive-inhands.rsi
# Triad Start
  - type: Clothing
    sprite: Objects/Weapons/Melee/crusher_glaive-inhands.rsi
    quickEquip: false
    slots:
    - back
    - suitStorage
# Triad End