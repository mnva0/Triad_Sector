- type: entity
  name: sledgehammer
  parent: SecBreachingHammer # Triad
  id: Sledgehammer
  description: The perfect tool for wanton carnage.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/sledgehammer.rsi
    state: icon
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 15 #Triad 20 < 10, low damage cause it would be too heavy to swing
        Structural: 40 #Triad 40 < 10
  - type: SpeedModifiedOnWield # Mono
    walkModifier: 0.9
    sprintModifier: 0.7
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 0.9
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 30 # Triad increased damage by 30 from 10 so its closer to breaching hammer
        Structural: 80 # Triad increased damage by 100 from 10 so its actually usable as a structural weapon
  - type: Item
    size: Ginormous # Triad
    shape:
    - 0,0,3,5 # Triad 
  - type: Clothing # Triad added backsprite
    sprite: Objects/Weapons/Melee/sledgehammer.rsi

- type: entity
  id: Mjollnir
  parent: BaseItem
  name: Mjollnir
  description: A weapon worthy of a god, able to strike with the force of a lightning bolt. It crackles with barely contained energy.
  components:
  - type: Wieldable
    useDelayOnWield: false
  - type: MeleeRequiresWield
  - type: LandAtCursor
  - type: Sprite
    sprite: Objects/Weapons/Melee/mjollnir.rsi
    layers:
    - state: icon
  - type: UseDelay
    delay: 10
  - type: UseDelayOnMeleeHit
  - type: MeleeThrowOnHit
    stunTime: 3
    activateOnThrown: true
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 5
        Structural: 5
    soundHit:
      path: /Audio/Effects/tesla_consume.ogg
      params:
        variation: 0.10
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 20
        Structural: 25
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 15
        Structural: 15
  - type: Item
    size: Ginormous

- type: entity
  id: SingularityHammer
  parent: BaseItem
  name: Singularity Hammer
  description: The pinnacle of close combat technology, the hammer harnesses the power of a miniaturized singularity to deal crushing blows.
  components:
  - type: Wieldable
    useDelayOnWield: false
  - type: MeleeRequiresWield
  - type: Sprite
    sprite: Objects/Weapons/Melee/singularityhammer.rsi
    layers:
    - state: icon
  - type: RepulseAttract
    speed: -15 #Anything above this pushes things too far away from the Wizard
    range: 5
    whitelist:
      components:
      - MobMover
      - Item
  - type: UseDelay
    delay: 10
  - type: UseDelayOnMeleeHit
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 5
        Structural: 5
    soundHit:
      path: /Audio/Effects/radpulse5.ogg
      params:
        variation: 0.10
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 15
        Structural: 15
  - type: Item
    size: Ginormous
