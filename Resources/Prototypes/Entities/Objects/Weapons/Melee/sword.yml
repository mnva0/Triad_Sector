- type: entity
  suffix: Sword # Triad
  parent: BaseItem
  id: BaseSword
  abstract: true
  components:
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: MeleeWeapon
    heavyStaminaCost: 8 # Triad
    attackRate: 1.1 # Triad
    wideAnimationRotation: -135
    damage: # Triad base 32 damage for every all basic sword
      types:
        Slash: 32
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Sprite
    state: icon
  - type: Item
    size: Large
  - type: Tag # Triad
    tags:
    - Sword
  - type: Utensil
    types:
      - Knife
  - type: Tool
    qualities:
    - Slicing
  - type: DisarmMalus # Triad
  - type: Clothing # Triad
    quickEquip: false
    slots:
    - back
    - suitStorage
# Triad Start - Audio Overhaul
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/Items/unsheath.ogg
      params:
        volume: -2
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_drop.ogg
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/sabre_drop.ogg
      params:
        volume: -4
# Triad End

- type: entity
  name: captain's sabre
  parent: BaseSword
  id: CaptainSabre
  description: A common sighting among ship captains. Once ceremonial, it now has common use for self-defense.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/captain_sabre.rsi
  - type: MeleeWeapon
    attackRate: 1.2 # Triad
  - type: Reflect
    reflectProb: .1
    spread: 90
  - type: Item
    sprite: Objects/Weapons/Melee/captain_sabre.rsi
  - type: Tag
    tags:
    - CaptainSabre
  - type: DisarmMalus
  # Triad Start - disable target of random sentience event
  # - type: SentienceTarget
  #   flavorKind: station-event-random-sentience-flavor-inanimate
  #   weight: 0.0002 # 5,000 times less likely than 1 regular animal
  # Triad End
  - type: PirateAccent
    # not putting a BlockMovement component here cause that's funny.

- type: entity
  name: katana
  parent: BaseSword
  id: Katana
  description: Ancient craftwork made with not so ancient plasteel.
  components:
  - type: Tag
    tags:
    - Katana
  - type: Sprite
    sprite: Objects/Weapons/Melee/katana.rsi
  - type: MeleeWeapon
  - type: Item
    sprite: Objects/Weapons/Melee/katana.rsi

- type: entity
  name: energy katana
  parent: Katana
  id: EnergyKatana
  description: A katana infused with strong energy.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/energykatana.rsi
  - type: MeleeWeapon
    wideAnimationRotation: -60
    damage:
      types:
        Slash: 40
  - type: Item
    sprite: Objects/Weapons/Melee/energykatana.rsi
  - type: EnergyKatana
  - type: DashAbility
  - type: LimitedCharges
    maxCharges: 3
  - type: AutoRecharge
    rechargeDuration: 20
  - type: Clothing
    sprite: Objects/Weapons/Melee/energykatana.rsi
    slots:
    - back # Triad minor rename
    - suitStorage # Triad added suitStorage
    - Belt
  - type: Reflect

- type: entity
