  - type: Tag # Triad
    tags:
    - LongBlade
  - type: Sprite
    sprite: Objects/Weapons/Melee/claymore.rsi
  - type: MeleeWeapon
    angle: 90 # Triad
    range: 1.6 # Triad
    heavyStaminaCost: 15 # Triad
    attackRate: 0.6 # Triad 0.6 < 0.75, Slower but higher damage
    damage:
      types:
        Slash: 40 # Triad increased to 40
  - type: Clothing
    sprite: Objects/Weapons/Melee/claymore.rsi
    slots:
    - back
    - suitStorage

- type: entity
