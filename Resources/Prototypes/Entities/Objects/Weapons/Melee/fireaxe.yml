- type: entity
  suffix: Axe # Triad
  name: fireaxe
  parent: BaseItem
  id: FireAxe
  description: Truly, the weapon of a madman. Who would think to fight fire with an axe?
  components:
  - type: Tag
    tags:
    - FireAxe
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: Sprite
    sprite: Objects/Weapons/Melee/fireaxe.rsi
    state: icon
  - type: MeleeWeapon
    heavyStaminaCost: 15 # goob edit
    wideAnimationRotation: 135
    swingLeft: true
    attackRate: 0.6 # Triad 0.6 < 0.75 
    damage:
      types:
        # axes are kinda like sharp hammers, you know?
        Slash: 20
        Structural: 20
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg # Triad, change to slice
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 25
        Structural: 40
  - type: Item
    size: Huge #Triad Huge < Ginormous
    shape:
    - 0,0,2,3 # Triad Axe size, slightly bigger than sword
  - type: Clothing
    sprite: Objects/Weapons/Melee/fireaxe.rsi
    quickEquip: false
    slots:
    - back
    - suitStorage
  - type: Tool
    qualities:
    - Prying
    - Axing # DeltaV - The return of fireaxe prying
  - type: ToolTileCompatible
  - type: Prying
  - type: UseDelay
    delay: 1
  - type: StealTarget
    stealGroup: FireAxe
  - type: IgniteOnMeleeHit
    fireStacks: -4
# Triad Start - Audio
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/crowbar_drop.ogg
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/sabre_drop.ogg
      params:
        volume: -4
# Triad End - Audio
