- type: entity
  name: ritual dagger
  parent: BaseKnife # Change to BaseKnife cause why not - cannot throw
  id: RitualDagger
  description: A strange dagger used by sinister groups for rituals and sacrifices.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/cult_dagger.rsi
    state: icon
  - type: MeleeWeapon
    damage:
      types:
        Slash: 24
  - type: Item
  - type: Clothing
    sprite: Objects/Weapons/Melee/cult_dagger.rsi
    slots:
    - back
  - type: DisarmMalus

- type: entity
  name: eldritch blade
  parent: Claymore # Triad Change to Claymore
  id: EldritchBlade
  description: A Large sword humming with unholy energy.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/cult_blade.rsi
    state: icon
  - type: MeleeWeapon # Triad, Removed a bunch of code since eldritch blade is now the same as claymore
  - type: Item
    sprite: Objects/Weapons/Melee/cult_blade.rsi

- type: entity
  name: unholy halberd
  parent: FireAxe # Triad Change to FireAxe for references, and execute
  id: UnholyHalberd
  description: A poleaxe that seems to be linked to its wielder.
  components:
  - type: Tag
    tags: []
  - type: Sprite
    sprite: Objects/Weapons/Melee/cult_halberd.rsi
    state: icon
  - type: MeleeWeapon
    angle: 90 # Triad
    range: 1.8 # Triad
    wideAnimationRotation: -135
    swingLeft: false
    attackRate: 0.5 # Triad 0.5 < 0.75 
    damage:
      types:
        Blunt: 5 #Triad 5 < 10
        Slash: 10
        Structural: 20 #Triad 20 < 10
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5 # Triad 5 < 10, blunt can only do so much, slash go br
        Slash: 30 # Triad 30 < 15, increased damage compensate speed
        Structural: 80 # Triad 80 < 30, High structural compensate with slower attack rate
  - type: ClothingSpeedModifier # Triad added movement related on held
    walkModifier: 1
    sprintModifier: 0.9
  - type: SpeedModifiedOnWield
    walkModifier: 0.9
    sprintModifier: 0.7
  - type: Clothing
    sprite: Objects/Weapons/Melee/cult_halberd.rsi